name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
        
      - name: Build Production
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Prepare Deployment Package
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp -r server deploy/ 2>/dev/null || mkdir -p deploy/server
          
      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '~/public_html' }}
            
            # Backup existing deployment
            if [ -d "current" ]; then
              timestamp=$(date +%Y%m%d_%H%M%S)
              mv current backup_$timestamp 2>/dev/null || true
              # Keep only last 3 backups
              ls -t backup_* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
            fi
            
            # Create deployment directory
            mkdir -p current
            
      - name: Upload Files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy/*"
          target: ${{ secrets.DEPLOY_PATH || '~/public_html' }}/current
          strip_components: 1
          rm: false
          
      - name: Install Dependencies and Start Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '~/public_html' }}/current
            
            # Install production dependencies only
            npm ci --production --legacy-peer-deps
            
            # Create server directory if it doesn't exist
            mkdir -p server
            
            # Stop existing Node.js process
            pkill -f "node.*server.cjs" || true
            sleep 2
            
            # Start application with PM2 or direct node
            if command -v pm2 &> /dev/null; then
              pm2 delete lifevision-healthcare 2>/dev/null || true
              pm2 start dist/server.cjs --name lifevision-healthcare --time
              pm2 save
            else
              # Fallback: start with nohup
              nohup node dist/server.cjs > logs/app.log 2>&1 &
            fi
            
            echo "Deployment completed successfully!"
            
      - name: Health Check
        run: |
          echo "Waiting for application to start..."
          sleep 10
          echo "Deployment completed! Check your Hostinger domain."
          
      - name: Cleanup
        if: always()
        run: rm -rf deploy
